services:
  searxng:
    image: searxng/searxng:latest
    container_name: local_llm_searxng
    ports:
      - "8889:8080"
    volumes:
      - ./docker/searxng:/etc/searxng:rw
    environment:
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY:-local_dev_only_change_in_production}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
